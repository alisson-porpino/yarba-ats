services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yarba-app
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    init: true

volumes:
  node_modules:
